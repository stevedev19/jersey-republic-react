version: '3.8'

services:
  # MongoDB Database
  mongodb:
    image: mongo:6.0
    container_name: jersey-republic-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password123
      MONGO_INITDB_DATABASE: jersey-republic
    volumes:
      - mongodb_data:/data/db
      - ./backend/scripts/mongo-init.js:/docker-entrypoint-initdb.d/mongo-init.js:ro
    networks:
      - jersey-network

  # Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: jersey-republic-backend
    restart: unless-stopped
    ports:
      - "3003:3003"
    environment:
      NODE_ENV: production
      MONGO_URL: mongodb://mongodb:27017/jersey-republic
      PORT: 3003
      SESSION_SECRET: your-production-session-secret
      JWT_SECRET: your-production-jwt-secret
      CORS_ORIGIN: http://<MY_SERVER_IP>:3000
    depends_on:
      - mongodb
    volumes:
      - ./backend/uploads:/app/uploads
    networks:
      - jersey-network

  # Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: jersey-republic-frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    environment:
      REACT_APP_API_URL: http://<MY_SERVER_IP>:3000
      REACT_APP_ENV: production
    depends_on:
      - backend
    networks:
      - jersey-network

  # Nginx Reverse Proxy (Optional)
  nginx:
    image: nginx:alpine
    container_name: jersey-republic-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - frontend
      - backend
    networks:
      - jersey-network

volumes:
  mongodb_data:

networks:
  jersey-network:
    driver: bridge
